name: Update Utterances Comment Counts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"
  push:
    branches: ["main", "master"]
    paths:
      - "_posts/**"
      - "_config.yml"
      - ".github/workflows/update-utterances-comments.yml"

permissions:
  contents: write
  issues: read

jobs:
  update-comments:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate comment data from utterances issues
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "all",
              per_page: 100
            });

            function normalizePath(input) {
              if (!input) return null;
              let s = String(input).trim();
              if (!s) return null;

              // Try URL parsing first (supports absolute URL in issue title)
              try {
                const u = new URL(s);
                s = u.pathname || s;
              } catch (_) {}

              // Extract first path-like token if mixed text
              const m = s.match(/\/[A-Za-z0-9\-/_\.]+\/?/);
              if (m) s = m[0];

              if (!s.startsWith("/")) return null;
              s = s.replace(/\/index\.html$/i, "/");
              s = s.replace(/\/{2,}/g, "/");
              if (s.length > 1 && s.endsWith("/")) s = s.slice(0, -1);
              return s;
            }

            function setAliases(target, key, count) {
              if (!key) return;
              const noSlash = key;
              const withSlash = key === "/" ? "/" : key + "/";
              const indexHtml = key === "/" ? "/index.html" : key + "/index.html";
              const html = key === "/" ? "/index.html" : key + ".html";
              const parts = key.split("/").filter(Boolean);
              const slug = parts.length ? parts[parts.length - 1] : null;
              target[noSlash] = count;
              target[withSlash] = count;
              target[indexHtml] = count;
              target[html] = count;
              if (slug) target["slug:" + slug] = count;
            }

            const comments = {};
            for (const issue of issues) {
              if (issue.pull_request) continue;
              const title = (issue.title || "").trim();
              const normalized = normalizePath(title);
              if (!normalized) continue;
              setAliases(comments, normalized, issue.comments || 0);
            }

            const out = {
              updated_at: new Date().toISOString(),
              comments
            };

            const outDir = path.join(process.cwd(), "_data");
            fs.mkdirSync(outDir, { recursive: true });
            fs.writeFileSync(
              path.join(outDir, "utterances_comments.json"),
              JSON.stringify(out, null, 2) + "\n",
              "utf8"
            );

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/utterances_comments.json
          git commit -m "chore: update utterances comment counts"
          git push
